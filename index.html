<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MyMusic</title>
</head>
<body>
    <header>
        <div class="container-header">
            <div class="title-hearder">
            <h1>MyMusic</h1>
            </div>
            <div class="navbar">
            <nav>
                <ul>
                    <li><a class="link" href="#">Home</a></li>
                    <li><a class="link" href="#">About</a></li>
                </ul>
            </nav>
            </div>
        </div>
    </header>
    <div id="cursor"></div>
    <main class="container">
        <!-- <h2>Welcome to MyMusic</h2>
        <p>Your one-stop destination for all things music. Explore new artists, listen to your favorite tracks, and discover the latest hits.</p> -->
            <div class="container-player">
                <div class="info-player">
                    <h3 class="title-playlist">PlayList</h3>
                    <p class="subtitle-playlist">Daily Mix</p> 

                <audio id="audio" src="aud/bjork.mp3"></audio>
                <div class="player">
                    <div class="controls">
                        <button class="btn-control anterior">◀</button>
                        
                        <div class="disco">
                            <img class="cd" src="img/bjork.jpg" alt="Disco">
                            <button class="btn-control play">▶</button>
                        </div>
                        
                        <button class="btn-control proximo">▶▶</button>
                    </div>
                </div>

                    <h3 class="title-player">Army of Me</h3>
                    <p class="artist-player">Bjork</p>
                </div>

            </div>

            <div class="container-musics">
                <h3 class="title-musics">Next music</h3>
                <div class="music-track">
                    <!-- musicas no js add por DOM -->
                </div>
            </div>
    </main>

    <footer>
        <div class="footer-cotainer">
        <p class="text-footer">&copy; 2023 MyMusic. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
